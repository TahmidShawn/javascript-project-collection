<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Color Picker</title>
        <link rel="stylesheet" href="style.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
    </head>
    <body>
        <div class="container">
            <h1>Choose Color</h1>
            <button id="generateColorBtn">Generate color</button>
            <!-- color container -->
            <div class="color-container">
                <!-- box 1 -->
                <div class="color-box">
                    <div
                        class="color-div"
                        style="background-color: #ee9e86"
                    ></div>
                    <p class="color-code">#ee9e86</p>
                </div>
                <!-- box 2 -->
                <div class="color-box">
                    <div
                        class="color-div"
                        style="background-color: #689b2e"
                    ></div>
                    <p class="color-code">#689b2e</p>
                </div>
                <!-- box 3 -->
                <div class="color-box">
                    <div
                        class="color-div"
                        style="background-color: #f1f58c"
                    ></div>
                    <p class="color-code">#f1f58c</p>
                </div>
                <!-- box 4 -->
                <div class="color-box">
                    <div
                        class="color-div"
                        style="background-color: #e5643a"
                    ></div>
                    <p class="color-code">#e5643a</p>
                </div>
                <!-- box 5 -->
                <div class="color-box">
                    <div
                        class="color-div"
                        style="background-color: #48b56e"
                    ></div>
                    <p class="color-code">#48b56e</p>
                </div>
                <!-- box 6 -->
                <div class="color-box">
                    <div
                        class="color-div"
                        style="background-color: #ff3f05"
                    ></div>
                    <p class="color-code">#ff3f05</p>
                </div>
            </div>
        </div>

        <!-- script -->
        <script src="script.js"></script>
    </body>
</html>
